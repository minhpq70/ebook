# Docker Compose cho phát triển local
# Chạy: docker compose up --build

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./api/.env
    volumes:
      # Mount source code cho hot-reload khi dev
      - ./api:/app
      # Không mount venv từ host
      - /app/venv
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8001
      --reload
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    depends_on:
      - api
    restart: unless-stopped
