server {
    listen 80;
    server_name bookai.tinhvan.com;
    # Chuyển hướng toàn bộ traffic HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bookai.tinhvan.com;

    # Cấu hình đường dẫn tới chứng chỉ SSL vừa copy
    ssl_certificate /home/tinhvan/apps/ebook-platform/star_tinhvan.com.crt;
    ssl_certificate_key /home/tinhvan/apps/ebook-platform/star_tinhvan.com.key;

    # Tối ưu hóa SSL bảo mật (chuẩn hiện đại)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 200M;   # Cho phép upload PDF lớn

    # API Backend
    location /api/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;   # OCR/Ingestion có thể chạy lâu

        # SSE streaming: tắt buffering để events đi thẳng tới client
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_pass http://127.0.0.1:8080/api/;
    }

    # Frontend
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_pass http://127.0.0.1:3000;
    }
}
