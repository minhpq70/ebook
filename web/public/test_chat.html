<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <!-- marked.js — Markdown renderer (cùng chất lượng như ReactMarkdown trong /books) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Design System variables */
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --user-bubble: #3b82f6;
            --ai-bubble: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh; /* dynamic viewport height — thích ứng bàn phím ảo */
            height: 100vh; /* fallback cho trình duyệt cũ */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        /* Glassmorphism Header */
        header {
            padding: 12px 20px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 10;
            flex-shrink: 0;
        }
        header h1 { 
            font-size: 1.1rem; 
            font-weight: 600; 
            letter-spacing: 0.3px; 
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0; /* quan trọng cho flex shrink trên mobile */
        }
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            word-wrap: break-word;
        }
        .message p { margin-bottom: 8px; }
        .message p:last-child { margin-bottom: 0; }
        .message strong { color: #fff; }
        
        .message.user {
            background-color: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
        }
        .message.ai {
            background-color: var(--ai-bubble);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Markdown trong tin nhắn AI */
        .message.ai h1, .message.ai h2, .message.ai h3, .message.ai h4 {
            font-size: 1rem; font-weight: 600; margin: 0.6rem 0 0.3rem; color: #e2e8f0;
        }
        .message.ai p { margin: 0.3rem 0; }
        .message.ai ul, .message.ai ol { padding-left: 1.25rem; margin: 0.3rem 0; }
        .message.ai li { margin: 0.15rem 0; }
        .message.ai strong { color: #fff; }
        
        #input-area {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--surface);
            padding: 8px;
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            transform: translateY(-1px);
        }
        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 1rem;
            font-family: inherit;
        }
        input::placeholder { color: var(--text-muted); font-weight: 400; }
        button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 0 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover { 
            background: var(--primary-hover); 
            transform: scale(1.02);
        }
        button:disabled { 
            background: var(--border); 
            cursor: not-allowed; 
            color: var(--text-muted);
            transform: none;
        }
        
        /* Loading Dots */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--ai-bubble);
            padding: 16px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease-out;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes bounce { 
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 
            40% { transform: scale(1); opacity: 1; } 
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            header { padding: 10px 16px; }
            header h1 { font-size: 0.95rem; }
            #chat-container { padding: 12px; gap: 12px; }
            .message { max-width: 92%; padding: 12px 14px; font-size: 0.9rem; }
            #input-area { padding: 10px 12px; }
            .input-wrapper { padding: 6px; }
            input[type="text"] { font-size: 16px; } /* 16px tránh iOS auto-zoom */
            button { padding: 0 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="status-dot"></div>
        <h1>Book AI Assistant</h1>
    </header>
    
    <div id="chat-container">
        <div class="message ai">
            Xin chào! Tôi là trợ lý AI thông minh chuyên về cuốn sách bạn đang xem. Đừng ngần ngại đặt câu hỏi, yêu cầu tóm tắt hoặc giải thích bất cứ điều gì nhé!
        </div>
        <div class="typing-indicator" id="typing">
            <span></span><span></span><span></span>
        </div>
    </div>
    
    <div id="input-area">
        <form id="chat-form" class="input-wrapper">
            <input type="text" id="query-input" placeholder="Nhập câu hỏi của bạn..." autocomplete="off" autofocus>
            <button type="submit" id="send-btn">Gửi</button>
        </form>
    </div>

    <script>
        // Tự động nhận URL params
        const urlParams = new URLSearchParams(window.location.search);
        // Hỗ trợ: ?book_id=X&source=libol hoặc ?book_id=UUID
        const bookId = urlParams.get('book_id') || urlParams.get('external_id');
        const bookSource = urlParams.get('source') || null;
        
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');

        if (!bookId) {
            addMessage('❌ Lỗi tích hợp: Không tìm thấy ID sách (tham số ?external_id=...) trong URL. Vui lòng liên hệ quản trị viên.', 'ai');
            queryInput.disabled = true;
            sendBtn.disabled = true;
            queryInput.placeholder = "Chưa kết nối dữ liệu sách";
        }

        // Xử lý Markdown cơ bản
        // Dùng marked.js — cùng chất lượng như ReactMarkdown trong /books
        function formatMarkdown(text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text, { breaks: false, gfm: true });
            }
            // Fallback nếu CDN chưa load
            return text.replace(/\n/g, '<br>');
        }

        function addMessage(text, sender, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            if (isHtml) {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.textContent = text;
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv; // trả về element để có thể update (khi streaming)
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query || !bookId) return;

            // 1. In câu hỏi của người dùng
            addMessage(query, 'user');
            queryInput.value = '';
            
            // 2. Hiện dấu 3 chấm đang gõ
            chatContainer.appendChild(typingIndicator);
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 3. Khóa input
            sendBtn.disabled = true;
            sendBtn.style.opacity = '0.5';

            try {
                // Gọi thẳng API RAG Streaming của Backend (không cần Token vì endpoint này đang để public limit rate IP)
                const response = await fetch('/api/v1/rag/query/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book_id: bookId,
                        query: query,
                        task_type: 'auto',
                        source: bookSource
                    })
                });

                if (!response.ok) {
                    const errorObj = await response.json().catch(() => ({}));
                    throw new Error(errorObj.detail || 'Không thể kết nối đến máy chủ AI');
                }

                // 4. Tắt dấu 3 chấm
                typingIndicator.style.display = 'none';
                
                // 5. Tạo khung tin nhắn rỗng để streaming chữ vào
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ai`;
                chatContainer.appendChild(msgDiv);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let aiResponseText = '';

                // 6. Đọc luồng dữ liệu liên tục
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.substring(6).trim();
                            if (dataStr === '[DONE]') continue;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'token') {
                                    aiResponseText += data.data;
                                    // Cập nhật DOM liên tục
                                    msgDiv.innerHTML = formatMarkdown(aiResponseText);
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                } else if (data.type === 'error') {
                                    aiResponseText += `<br><br><span style="color:#ef4444">[Lỗi trích xuất: ${data.data}]</span>`;
                                    msgDiv.innerHTML = formatMarkdown(aiResponseText);
                                }
                            } catch (e) {
                                // Ignore parse errors for incomplete chunks
                            }
                        }
                    }
                }
            } catch (err) {
                typingIndicator.style.display = 'none';
                addMessage('❌ ' + err.message, 'ai');
            } finally {
                sendBtn.disabled = false;
                sendBtn.style.opacity = '1';
                queryInput.focus();
            }
        });

        // ── Mobile: xử lý bàn phím ảo thay đổi viewport ──
        function adjustViewport() {
            if (window.visualViewport) {
                const vh = window.visualViewport.height;
                document.body.style.height = vh + 'px';
                // Cuộn chat xuống cuối khi bàn phím mở
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustViewport);
            window.visualViewport.addEventListener('scroll', adjustViewport);
        }
        // Fallback: resize event
        window.addEventListener('resize', () => {
            document.body.style.height = window.innerHeight + 'px';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
        // Set initial height
        document.body.style.height = (window.visualViewport?.height || window.innerHeight) + 'px';
    </script>
</body>
</html>
