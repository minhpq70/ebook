<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Book Chat — Test Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1e293b;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 18px;
            color: #38bdf8;
            white-space: nowrap;
        }
        .config {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 1;
        }
        .config label {
            font-size: 12px;
            color: #94a3b8;
        }
        .config input, .config select {
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .config input:focus, .config select:focus {
            outline: none;
            border-color: #38bdf8;
        }
        #apiUrl { width: 260px; }
        #bookId { width: 320px; }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #1d4ed8;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }
        .msg.ai.streaming {
            border-color: #38bdf8;
        }
        .msg.error {
            background: #7f1d1d;
            border-color: #ef4444;
            color: #fecaca;
        }
        .msg .meta {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
        }

        .input-area {
            background: #1e293b;
            padding: 16px 24px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
        }
        #question {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            resize: none;
            height: 48px;
        }
        #question:focus {
            outline: none;
            border-color: #38bdf8;
        }
        #sendBtn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        #sendBtn:hover { background: #1d4ed8; }
        #sendBtn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.ok { background: #22c55e; }
        .status-dot.err { background: #ef4444; }
        .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <h1>📚 AI Book Chat</h1>
    <div class="config">
        <div>
            <label>API URL</label><br>
            <input id="apiUrl" value="https://ebook-api-7v44.onrender.com" placeholder="https://ebook-api-7v44.onrender.com">
        </div>
        <div>
            <label>Book ID</label><br>
            <input id="bookId" value="" placeholder="uuid-of-book">
        </div>
        <div>
            <label>Task</label><br>
            <select id="taskType">
                <option value="qa">Hỏi đáp (Q&A)</option>
                <option value="summarize">Tóm tắt</option>
                <option value="explain">Giải thích</option>
            </select>
        </div>
        <div>
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText" style="font-size:12px;color:#94a3b8;"></span>
        </div>
    </div>
</header>

<div class="chat-area" id="chatArea">
    <div class="msg ai">
        Chào bạn! Đây là giao diện test API hỏi đáp AI.<br><br>
        <b>Hướng dẫn:</b><br>
        1. Nhập <b>API URL</b> của backend (mặc định localhost:8001)<br>
        2. Nhập <b>Book ID</b> của cuốn sách cần hỏi<br>
        3. Gõ câu hỏi và nhấn Gửi (hoặc Enter)<br><br>
        <em>Câu trả lời sẽ hiện ra dần dần (streaming).</em>
    </div>
</div>

<div class="input-area">
    <textarea id="question" placeholder="Nhập câu hỏi... (Enter để gửi, Shift+Enter xuống dòng)" rows="1"></textarea>
    <button id="sendBtn" onclick="sendQuestion()">Gửi ▶</button>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const questionInput = document.getElementById('question');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let isStreaming = false;

questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isStreaming) sendQuestion();
    }
});

function addMessage(text, role, extra) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    if (extra) {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = extra;
        div.appendChild(meta);
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
}

async function sendQuestion() {
    const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
    const bookId = document.getElementById('bookId').value.trim();
    const question = questionInput.value.trim();
    const taskType = document.getElementById('taskType').value;

    if (!bookId) { alert('Vui lòng nhập Book ID'); return; }
    if (!question) return;

    // Show user message
    addMessage(question, 'user');
    questionInput.value = '';

    // Create AI message placeholder
    const aiMsg = addMessage('', 'ai streaming');
    isStreaming = true;
    sendBtn.disabled = true;
    statusDot.className = 'status-dot loading';
    statusText.textContent = 'Đang xử lý...';

    const startTime = Date.now();
    let fullText = '';

    try {
        const response = await fetch(`${apiUrl}/api/v1/rag/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                book_id: bookId,
                question: question,
                task_type: taskType,
                top_k: 8
            })
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = line.substring(6);
                    if (data === '[DONE]') continue;
                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.content) {
                            fullText += parsed.content;
                            aiMsg.textContent = fullText;
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                    } catch {
                        // Có thể là plain text
                        fullText += data;
                        aiMsg.textContent = fullText;
                    }
                }
            }
        }

        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `⏱ ${elapsed}s`;
        aiMsg.appendChild(meta);

        statusDot.className = 'status-dot ok';
        statusText.textContent = 'Sẵn sàng';

    } catch (err) {
        aiMsg.className = 'msg ai error';
        aiMsg.textContent = `❌ Lỗi: ${err.message}`;
        statusDot.className = 'status-dot err';
        statusText.textContent = 'Lỗi kết nối';
    }

    aiMsg.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    questionInput.focus();
}
</script>

</body>
</html>
